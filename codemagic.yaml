workflows:
  ios-release:
    name: VPNeo iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        XCODE_PROJECT: "speedtest IOS.xcodeproj"
        XCODE_SCHEME: "speedtest IOS"
        APP_STORE_APP_ID: 6761053051
      xcode: latest
    scripts:
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files com.vpneo.app --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files com.vpneo.app.tunnel --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files com.vpneo.app.widget --type IOS_APP_STORE --create
          app-store-connect certificates list --type IOS_DISTRIBUTION --save || \
          app-store-connect certificates create --type IOS_DISTRIBUTION --save
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Increment build number
        script: |
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS' DEVELOPMENT_TEAM=JL9MW5YCQM"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
